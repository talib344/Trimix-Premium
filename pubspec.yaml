name: trimix_premium
description: "EDIT ONCE, SHARE EVERYWHERE, GROW EVERYWHERE - Professional video editor for content creators"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.22.0 <4.0.0'
  flutter: 3.22.0

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: 6.1.2
  
  # Networking
  http: 1.2.2
  dio: 5.4.2
  
  # Video & Media Processing
  ffmpeg_kit_flutter: 6.0.3
  image_picker: 1.1.2
  video_player: 2.8.2
  
  # Local Storage
  shared_preferences: 2.2.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  
  # Firebase
  firebase_core: 3.3.0
  firebase_messaging: 15.0.3
  
  # UI & Theme
  flutter_screenutil: 5.9.0
  google_fonts: 6.1.0
  
  # Utilities
  intl: 0.19.0
  uuid: 4.0.0
  get: 4.6.6
  
  # File Management
  path_provider: 2.1.1
  
  # Permission Handling
  permission_handler: 11.4.4
  
  # Ads
  google_mobile_ads: 4.0.0
  
  # Deep Linking
  uni_links_web: 0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_linter: 3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/logos/
    - assets/animations/
    - assets/fonts/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Italic.ttf
          style: italic
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
